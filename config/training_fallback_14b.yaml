# Training config — Qwen3-14B (fallback)
# Activate if W1 decision gate shows 27B exceeds available Lightning quota.
# 14B trains ~3x faster than 27B → same pipeline, smaller model.

model:
  name: "Qwen/Qwen3-14B-Instruct"
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

dora:
  use_dora: true
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

cpt:
  r: 128
  lora_alpha: 256
  lora_dropout: 0.0
  bias: "none"
  max_seq_length: 8192
  num_train_epochs: 3
  per_device_train_batch_size: 4    # can fit larger batch at 14B
  gradient_accumulation_steps: 4   # effective batch = 16
  learning_rate: 5.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  optim: "paged_adamw_8bit"
  gradient_checkpointing: "unsloth"
  fp16: false
  bf16: true
  logging_steps: 25
  save_steps: 500
  save_total_limit: 2
  push_to_hub: true
  hub_model_id: "YOUR_HF_USERNAME/qwen-cobol-14b-cpt"

sft:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.0
  bias: "none"
  max_seq_length: 8192
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 3.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  optim: "paged_adamw_8bit"
  gradient_checkpointing: "unsloth"
  fp16: false
  bf16: true
  logging_steps: 25
  save_steps: 500
  save_total_limit: 2
  push_to_hub: true
  hub_model_id: "YOUR_HF_USERNAME/qwen-cobol-14b-sft"
  curriculum: true

dpo:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.0
  bias: "none"
  max_seq_length: 8192
  num_train_epochs: 2
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5
  lr_scheduler_type: "linear"
  warmup_ratio: 0.1
  weight_decay: 0.0
  optim: "paged_adamw_8bit"
  gradient_checkpointing: "unsloth"
  fp16: false
  bf16: true
  beta: 0.1
  logging_steps: 10
  save_steps: 200
  save_total_limit: 2
  push_to_hub: true
  hub_model_id: "YOUR_HF_USERNAME/qwen-cobol-14b-dpo"

hardware:
  # L40S 48 GB VRAM
  # At 4-bit nf4 + DoRA r=128: ~8-9 GB VRAM for 14B — very comfortable
  expected_vram_gb: 9
  expected_tokens_per_sec_cpt: ~3500
  expected_tokens_per_sec_sft: ~4000

datasets:
  cpt_corpus: "YOUR_HF_USERNAME/cobol-cpt-corpus"
  sft_dataset: "YOUR_HF_USERNAME/cobol-sft-dataset"
  dpo_dataset: "YOUR_HF_USERNAME/cobol-dpo-dataset"
  streaming: true

wandb:
  project: "qwen-cobol"
  run_prefix: "14b"
