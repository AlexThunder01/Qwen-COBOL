# Training config — Qwen3.6-27B SFT (primary)
# Hardware target: RTX PRO 6000 Blackwell 96GB — nessun rischio OOM, batch più grandi
# Budget: ~$11.91 Lightning → ~4h su RTX PRO 6000 (~$2.89/h) = ~$11.50

model:
  name: "Qwen/Qwen3.6-27B"       # modello BASE (non instruct)
  load_in_4bit: false            # bf16: Blackwell 96GB → 27B ~54GB ci sta, no tassa dequant 4-bit
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

dora:
  use_dora: false                   # LoRA: ~1.4x più veloce di DoRA, qualità simile (DoRA in iter 2)
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

sft:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.0
  bias: "none"
  max_seq_length: 2048              # 17k esempi median ~700 token — 2048 ok, batch più grande
  packing: true                     # (unsloth lo ignora, ma innocuo)
  num_train_epochs: 1               # epoca piena = 1116 step; con bf16 dovrebbe entrare nel budget
  max_steps: -1                     # disabilitato — governa num_train_epochs
  per_device_train_batch_size: 4    # RTX PRO 6000 96GB → batch 4 con 27B QLoRA 4-bit
  gradient_accumulation_steps: 4   # effective batch = 16
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  optim: "paged_adamw_8bit"
  gradient_checkpointing: false     # 96GB → niente checkpointing, massima velocità
  fp16: false
  bf16: true
  logging_steps: 10
  save_steps: 300                   # checkpoint+push ogni 300 step (insurance se interrotto)
  save_total_limit: 1
  push_to_hub: true
  hub_model_id: "AlexThunder0/qwen-cobol-27b-sft"
  curriculum: false                 # max_steps = run parziale → shuffle per rappresentatività

dpo:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.0
  bias: "none"
  max_seq_length: 2048
  num_train_epochs: 2
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5
  lr_scheduler_type: "linear"
  warmup_ratio: 0.1
  weight_decay: 0.0
  optim: "paged_adamw_8bit"
  gradient_checkpointing: "unsloth"
  fp16: false
  bf16: true
  beta: 0.1
  logging_steps: 10
  save_steps: 200
  save_total_limit: 2
  push_to_hub: true
  hub_model_id: "AlexThunder0/qwen-cobol-27b-dpo"

datasets:
  sft_dataset: "AlexThunder0/cobol-sft-dataset"
  dpo_dataset: "AlexThunder0/cobol-dpo-dataset"

wandb:
  project: "qwen-cobol"
  run_prefix: "27b"
