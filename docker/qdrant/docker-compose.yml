version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qwen-cobol-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"

volumes:
  qdrant_data:
